<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Parcelytics{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
  <a class="navbar-brand d-flex align-items-center gap-2" href="/">
    <img src="{{ url_for('static', filename='parcelytics-logo.png') }}"
         alt="Parcelytics" height="32" width="32"
         style="border-radius:4px; object-fit:contain;">
    <span class="fw-semibold">Parcelytics</span>
  </a>
  <div class="navbar-nav ms-auto">
    <a class="nav-link" href="/">Search</a>
    <a class="nav-link" href="/rates">Rate Trends</a>
    <a class="nav-link" href="/snapshot">Market Snapshot</a>
  </div>
</nav>

<main class="container py-4">
  {% block content %}{% endblock %}
</main>

<footer class="text-center text-muted py-3 small border-top mt-5">
  Data: Travis County Appraisal District &amp; Travis County Tax Office &bull; Not legal or tax advice
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
